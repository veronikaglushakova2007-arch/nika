services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: student_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db
    networks:
      - student-network

  web:
    image: nginx:latest
    container_name: student_web
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - student-network

  db:
    image: mariadb:10.11
    container_name: student_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: students
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - student-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: student_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - student-network

volumes:
  dbdata:

networks:
  student-network:
    driver: bridge
